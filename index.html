<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山頂バナナクラブ｜登山案内一覧</title>
  <meta name="description" content="山頂バナナクラブ 登山案内一覧">
  <style>
    :root {
      --paper: #FBFAF5;
      --ink: #1F1B16;
      --ink-soft: #6A6258;
      --line: #DDD7C6;
      --line-dot: #C8C0AC;
      --accent: #A88323;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic Medium", "Yu Gothic", sans-serif;
      font-weight: 400;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.9;
      letter-spacing: 0.03em;
      -webkit-font-smoothing: antialiased;
    }
    .mincho {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", "MS Mincho", serif;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
    }
    header {
      text-align: center;
      margin-bottom: 3.5rem;
    }
    header .club {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      color: var(--ink-soft);
      margin-bottom: 0.5rem;
    }
    header h1 {
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.1em;
    }
    header .rule {
      width: 48px;
      height: 1px;
      background: var(--accent);
      margin: 1.25rem auto 0;
    }
    ul.events {
      list-style: none;
    }
    ul.events li + li {
      margin-top: 1.25rem;
    }
    ul.events a {
      display: block;
      padding: 1.5rem 1.75rem;
      border: 1px solid var(--line);
      background: #fff;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s ease;
    }
    ul.events a:hover {
      border-color: var(--accent);
    }
    .event-date {
      font-size: 0.8rem;
      color: var(--ink-soft);
      letter-spacing: 0.08em;
      margin-bottom: 0.35rem;
    }
    .event-name {
      font-size: 1.15rem;
      font-weight: 500;
    }
    .event-note {
      font-size: 0.85rem;
      color: var(--ink-soft);
      margin-top: 0.4rem;
    }
    footer {
      text-align: center;
      margin-top: 4rem;
      font-size: 0.75rem;
      color: var(--ink-soft);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="club mincho">山頂バナナクラブ</div>
      <h1 class="mincho">登山案内一覧</h1>
      <div class="rule"></div>
    </header>

    <ul class="events">
      <li>
        <a href="kurokamiyama/">
          <div class="event-date">2026年7月19日（日）</div>
          <div class="event-name mincho">黒髪山（中級コース・竜門コース）</div>
          <div class="event-note">龍水亭にて昼食 13:00 / 武雄温泉</div>
        </a>
      </li>
      <li>
        <a href="tenzan/">
          <div class="event-date">2026年6月7日（日）</div>
          <div class="event-name mincho">天山</div>
          <div class="event-note">開催済み</div>
        </a>
      </li>
    </ul>

    <footer>山頂バナナクラブ</footer>
  </div>
</body>
</html>
